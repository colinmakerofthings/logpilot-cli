name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create GitHub Releases
  id-token: write   # needed for PyPI trusted publishing (OIDC)

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Run the full test suite before releasing
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install package (editable)
        run: pip install -e .

      - name: Run tests
        run: pytest

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build the source distribution and wheel
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Publish to PyPI via OIDC trusted publishing (no API token required)
  #    Set up the trusted publisher on PyPI first:
  #    https://docs.pypi.org/trusted-publishers/adding-a-publisher/
  # ──────────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/logpilot
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Create a GitHub Release with auto-generated release notes
  # ──────────────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for release notes

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # e.g. v1.0.0-rc1
